name: flutmiss android arm64

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: flutmiss-android-arm64-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_SUPPRESS_ANALYTICS: true
  PUB_CACHE: ~/.pub-cache

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Fetch dependencies
        run: flutter pub get

      - name: Build arm64 APK
        run: |
          flutter build apk \
            --debug \
            --target-platform android-arm64 \
            --dart-define=cronetHttpNoPlay=true

      - name: Collect APK artifact
        run: |
          mkdir -p dist
          echo "Built files:"
          find build/app/outputs/flutter-apk -maxdepth 1 -name '*.apk' -print
          apk_path=$(find build/app/outputs/flutter-apk -maxdepth 1 -name '*arm64*apk' | head -n 1)
          if [ -z "$apk_path" ]; then
            apk_path=$(find build/app/outputs/flutter-apk -maxdepth 1 -name 'app-debug.apk' | head -n 1)
          fi
          if [ -z "$apk_path" ]; then
            echo "No APK produced" >&2
            exit 1
          fi
          cp "$apk_path" dist/flutmiss-arm64-debug.apk
          ls -lh dist

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutmiss-arm64-debug-apk
          path: dist/flutmiss-arm64-debug.apk
          if-no-files-found: error
