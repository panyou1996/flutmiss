name: flutmiss android arm64

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: flutmiss-android-arm64-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_SUPPRESS_ANALYTICS: true
  PUB_CACHE: ~/.pub-cache

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Android build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends zip unzip

      - name: Create temporary signing key
        working-directory: android
        run: |
          keytool -genkeypair \
            -alias upload \
            -keyalg RSA \
            -keysize 2048 \
            -validity 36500 \
            -storetype JKS \
            -keystore app/upload-keystore.jks \
            -storepass android \
            -keypass android \
            -dname "CN=Flutter CI, OU=CI, O=GitHub, L=Earth, S=Earth, C=US"
          cat > key.properties <<'EOF'
          storePassword=android
          keyPassword=android
          keyAlias=upload
          storeFile=upload-keystore.jks
          EOF

      - name: Fetch dependencies
        run: flutter pub get

      - name: Build arm64 APK
        run: flutter build apk --release --target-platform android-arm64 --dart-define=cronetHttpNoPlay=true

      - name: Rename artifact
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/flutmiss-arm64-v8a-release.apk
          ls -lh dist

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutmiss-arm64-v8a-apk
          path: dist/flutmiss-arm64-v8a-release.apk
          if-no-files-found: error
