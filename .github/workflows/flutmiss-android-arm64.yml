name: flutmiss android arm64

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: flutmiss-android-arm64-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_SUPPRESS_ANALYTICS: true
  PUB_CACHE: ~/.pub-cache

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate CA certificates
        working-directory: core/doh_proxy
        run: cargo run --bin gen_ca

      - name: Sync cert resources
        run: bash scripts/sync_cert_resources.sh

      - name: Verify cert resources
        run: |
          test -f assets/certs/proxy_ca.pem
          test -f android/app/src/main/res/raw/proxy_ca.der
          ls -lh assets/certs android/app/src/main/res/raw

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Fetch dependencies
        run: flutter pub get

      - name: Build arm64 APK
        shell: bash
        run: |
          mkdir -p logs
          set -o pipefail
          flutter build apk \
            --debug \
            --target-platform android-arm64 \
            --dart-define=cronetHttpNoPlay=true \
            2>&1 | tee logs/flutter-build.log

      - name: Show build tail
        if: always()
        shell: bash
        run: |
          echo "--- build log tail ---"
          tail -n 200 logs/flutter-build.log || true

      - name: Collect APK artifact
        if: success()
        run: |
          mkdir -p dist
          echo "Built files:"
          find build/app/outputs/flutter-apk -maxdepth 1 -name '*.apk' -print
          apk_path=$(find build/app/outputs/flutter-apk -maxdepth 1 -name '*arm64*apk' | head -n 1)
          if [ -z "$apk_path" ]; then
            apk_path=$(find build/app/outputs/flutter-apk -maxdepth 1 -name 'app-debug.apk' | head -n 1)
          fi
          if [ -z "$apk_path" ]; then
            echo "No APK produced" >&2
            exit 1
          fi
          cp "$apk_path" dist/flutmiss-arm64-debug.apk
          ls -lh dist

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: flutmiss-arm64-debug-apk
          path: dist/flutmiss-arm64-debug.apk
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutmiss-arm64-build-log
          path: logs/flutter-build.log
          if-no-files-found: ignore

      - name: Publish GitHub Release
        if: success() && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: flutmiss-arm64-debug-latest
          name: flutmiss arm64 debug latest
          prerelease: true
          make_latest: false
          files: dist/flutmiss-arm64-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
